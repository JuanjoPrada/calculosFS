# Despliegue de calculosFS en Netlify.
# Netlify detecta Next.js y activa su runtime oficial (@netlify/plugin-nextjs).
# Si conectas el repositorio calculosFS directamente, no hay que configurar nada.

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# La plantilla .xlsx NO debe cachearse: si cambia, hay que servir siempre la ultima
# (evita que se descargue una version antigua/corrupta desde la cache del navegador o CDN).
[[headers]]
  for = "/plantilla/*"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
